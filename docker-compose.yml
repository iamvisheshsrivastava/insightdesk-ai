services:
  insightdesk-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: insightdesk-ai:latest
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
    restart: unless-stopped
