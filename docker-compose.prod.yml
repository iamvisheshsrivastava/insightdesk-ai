version: '3.8'
services:
  insightdesk-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${{ github.repository_owner }}/insightdesk-api:latest
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/${{ github.repository_owner }}/insightdesk-frontend:latest
    ports:
      - "80:80"
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
